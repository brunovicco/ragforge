# RAGForge v0.1 main benchmark. Every README number is born from this file (ADR-0004).
run_id: null  # assigned at run time; results land in experiments/<run-id>/
corpus:
  snapshot: datasets/corpus/
  hash: null  # set by the snapshot script
dataset:
  path: datasets/regrag-br/
  split: test  # dev split is reserved for router few-shot examples (ADR-0003)
strategies:
  - dense
  - sparse_bm25
  - hybrid_rrf
  - reranked
  - contextual
  - parent_child
  - raptor
  - graphrag
embedding:
  # ADR-0013: local is the operational default - no credentials needed,
  # provider-free execution - regardless of the embeddings-ptbr experiment's
  # (ADR-0005) quality result (Dense recall@5=0.947 for gemini-embedding-001
  # vs. BAAI/bge-m3's 0.789 on the real golden set; see
  # configs/experiments/embeddings-ptbr.yaml and
  # experiments/embeddings-ptbr/runs.jsonl). Qwen3-Embedding-0.6B is not a
  # predeclared quality winner - the full RegRAG-BR experiment determines
  # relative quality (ADR-0013's own acceptance criteria).
  provider: local
  model: Qwen/Qwen3-Embedding-0.6B
  # Matryoshka truncation size; only used when provider: gemini (pgvector's
  # HNSW index caps at 2000 dimensions). Ignored for provider: local - the
  # model reports its own native dimension.
  dimensions: 1536
  # To use the hosted comparator instead:
  #   provider: gemini
  #   model: gemini-embedding-001
  # (requires GEMINI_API_KEY or GOOGLE_API_KEY)
generation:
  # Not chosen via a dedicated comparison (unlike the embedding model,
  # ADR-0005) - a placeholder, not a data-driven winner, matching the
  # reranker model's status.
  model: gemini-3.1-flash-lite
  temperature: 0
judge:
  # RAGAS Faithfulness/Answer Relevancy judge model (ADR-0007). Scores are
  # unvalidated until the human-calibration exercise (kappa >= 0.6) happens.
  model: gemini-3.1-flash-lite
retrieval:
  top_k: 5
  rerank_pool: 50
llm_cache:
  mode: cache  # cache | live (ADR-0004)
execution:
  # ADR-0014. Both optional - omitting this whole section falls back to the
  # same defaults. Not the full execution.stages.* schema from the ADR (a
  # workers block per stage): only these two values actually control
  # anything today - answer generation + judge scoring (run_bounded) and the
  # Gemini ProviderLimiter shared by the embedder/generator/judge.
  answer_quality_workers: 5
  gemini_max_in_flight: 4
