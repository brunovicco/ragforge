# RAGForge v0.1 main benchmark. Every README number is born from this file (ADR-0004).
run_id: null  # assigned at run time; results land in experiments/<run-id>/
corpus:
  snapshot: datasets/corpus/
  hash: null  # set by the snapshot script
dataset:
  path: datasets/regrag-br/
  split: test  # dev split is reserved for router few-shot examples (ADR-0003)
strategies:
  - dense
  - sparse_bm25
  - hybrid_rrf
  - reranked
  - contextual
  - parent_child
  - raptor
  - graphrag
embedding:
  # Frozen winner of the embeddings-ptbr experiment (ADR-0005). Dense
  # recall@5=0.947 vs. BAAI/bge-m3's 0.789 on the real golden set - see
  # configs/experiments/embeddings-ptbr.yaml and experiments/embeddings-ptbr/runs.jsonl.
  model: gemini-embedding-001
  provider: gemini
  dimensions: 1536  # Matryoshka truncation; pgvector's HNSW index caps at 2000
generation:
  model: null  # pin exact model version, e.g. provider snapshot date
  temperature: 0
judge:
  model: null  # pinned; calibration reported per ADR-0007
retrieval:
  top_k: 5
  rerank_pool: 50
llm_cache:
  mode: cache  # cache | live (ADR-0004)
